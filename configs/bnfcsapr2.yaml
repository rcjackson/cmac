# CMAC configuration for the BNF C-SAPR2 radar (PPI + RHI scan strategies).
#
# This file reproduces the built-in `bnf_csapr2_ppi` and `bnf_csapr2_rhi`
# defaults from cmac/default_config.py in YAML form. Pass it via the
# `config_file=` argument on cmac.get_metadata, cmac.get_field_names,
# cmac.get_cmac_values, cmac.get_plot_values, cmac.get_zs_relationships,
# or directly to cmac.cmac / cmac.quicklooks_ppi / cmac.quicklooks_rhi /
# cmac.tall_clutter.
#
# Metadata, field_names, and cmac_values are identical for the two scan
# strategies (same radar, same processing). YAML merge keys (<<:) are
# used so the RHI entries inherit from PPI and only override the
# scan-strategy-specific save_name. plot_values diverges more (RHI has
# no lat/lon map bounds), so it's spelled out separately.

metadata:
  bnf_csapr2_ppi: &bnf_csapr2_metadata
    site_id: bnf
    facility_id: s3
    comment: >-
      This is highly experimental and initial data. There are many known
      and unknown issues. Please do not use before contacting the
      Translator responsible scollis@anl.gov
    attributions: >-
      This data is collected by the ARM Research facility. Radar system
      is operated by the radar engineering team radar@arm.gov and the
      data is processed by the precipitation radar products team. LP
      code courtesy of Scott Giangrande BNL.
    version: "2.0 lite"
    vap_name: cmac
    known_issues: >-
      False phidp jumps in insect regions.Issues with some snow below
      melting layer.
    developers: "Robert Jackson, ANL. Zachary Sherman, ANL."
    translator: "Scott Collis, ANL."
    mentors: "Bradley Isom, PNNL. Iosif Lindenmaier, PNNL."
    Conventions: "CF/Radial instrument_parameters ARM-1.3"
    references: "See CSAPR2 Instrument Handbook"
    source: >-
      Atmospheric Radiation Measurement (ARM) program C-band Scanning
      ARM Precipitation Radar 2 (CSAPR2)
    institution: >-
      United States Department of Energy - Atmospheric Radiation
      Measurement (ARM) program
    doi: "10.5439/1668872"
  bnf_csapr2_rhi:
    <<: *bnf_csapr2_metadata

field_names:
  bnf_csapr2_ppi: &bnf_csapr2_field_names
    # Radar field names
    input_zdr: differential_reflectivity
    reflectivity: reflectivity
    velocity: mean_doppler_velocity
    normalized_coherent_power: normalized_coherent_power
    cross_correlation_ratio: copol_correlation_coeff
    input_phidp_field: differential_phase
    input_clutter_corrected_reflectivity: reflectivity
    clutter: ground_clutter
    differential_reflectivity: differential_reflectivity
    signal_to_noise_ratio: signal_to_noise_ratio_copolar_h
    # Sonde field names
    altitude: alt
    temperature: tdry
    u_wind: u_wind
    v_wind: v_wind
    # Input field names to attenuation code
    zdr_field: corrected_differential_reflectivity
    pia_field: path_integrated_attenuation
    phidp_field: corrected_differential_phase
    refl_field: corrected_reflectivity
  bnf_csapr2_rhi:
    <<: *bnf_csapr2_field_names

cmac_values:
  bnf_csapr2_ppi: &bnf_csapr2_cmac_values
    save_name: bnfcsapr2cmacppiS3.c1
    sonde_name: bnfsondewnpnM1.b1
    site_alt: 12
    self_const: 60000.00
    attenuation_a_coef: 0.0633
    c_coef: 0.3
    d_coef: 1.0804
    beta_coef: 0.64884
    flip_phidp: false
    phidp_flipped:
      - uncorrected_differential_phase
      - differential_phase
    gen_clutter_from_refl: false
    ref_offset: 0.8
    zdr_offset: 0.7
    gen_clutter_from_refl_diff: -0.2
    gen_clutter_from_refl_alt: 2000.0
    clutter_mask_z_for_texture: false
    rain_rate_a_coef_A: 294.0
    rain_rate_b_coef_A: 0.89
    rain_rate_a_coef_Z: 0.017
    rain_rate_b_coef_Z: 0.714
    rain_rate_a_coef_Kdp: 25.1
    rain_rate_b_coef_Kdp: 0.777
    kdp_method: bringi
    beam_width: 1.0
    radar_height_offset: 10.0
    # Fuzzy-logic membership functions. Each class lists every field used
    # by the classifier; each entry is [[x1, x2, x3, x4], weight] forming
    # a trapezoidal membership function. Overriding `mbfs` replaces the
    # whole dict, so list every class you want active.
    mbfs:
      multi_trip:
        velocity_texture:        [[7.7, 10.0, 130.0, 130.0], 4.0]
        copol_correlation_coeff: [[0.7, 0.8, 1, 1], 0.0]
        normalized_coherent_power: [[0, 0, 0.3, 0.35], 1.0]
        height:                  [[0, 0, 5000, 8000], 0.0]
        sounding_temperature:    [[-100, -100, 100, 100], 0.0]
        signal_to_noise_ratio:   [[-2, 2, 1000, 1000], 1.0]
      rain:
        velocity_texture:        [[0, 0, 2.0, 2.1], 0.0]
        copol_correlation_coeff: [[0.97, 0.98, 1, 1], 2.0]
        normalized_coherent_power: [[0.4, 0.5, 1, 1], 0.0]
        height:                  [[0, 0, 5000, 6000], 0.0]
        sounding_temperature:    [[2.0, 5.0, 100, 100], 2.0]
        signal_to_noise_ratio:   [[-2, 2, 1000, 1000], 1.0]
      snow:
        velocity_texture:        [[0, 0, 2.0, 2.1], 1.0]
        copol_correlation_coeff: [[0.85, 0.9, 1, 1], 1.0]
        normalized_coherent_power: [[0.4, 0.5, 1, 1], 1.0]
        height:                  [[0, 0, 25000, 25000], 0.0]
        sounding_temperature:    [[-100, -100, 0.5, 4.0], 2.0]
        signal_to_noise_ratio:   [[-2, 2, 1000, 1000], 1.0]
      no_scatter:
        velocity_texture:        [[0, 0, 330.0, 330.0], 2.0]
        copol_correlation_coeff: [[0, 0, 0.1, 0.2], 0.0]
        normalized_coherent_power: [[0, 0, 0.1, 0.2], 0.0]
        height:                  [[0, 0, 25000, 25000], 0.0]
        sounding_temperature:    [[-100, -100, 100, 100], 0.0]
        signal_to_noise_ratio:   [[-100, -100, -2, 0], 4.0]
      melting:
        velocity_texture:        [[0, 0, 2.0, 2.1], 0.0]
        copol_correlation_coeff: [[0.6, 0.65, 0.95, 0.96], 4.0]
        normalized_coherent_power: [[0.4, 0.5, 1, 1], 0]
        height:                  [[0, 0, 25000, 25000], 0.0]
        sounding_temperature:    [[-1, -0.5, 3, 4], 4.0]
        signal_to_noise_ratio:   [[-2, 2, 1000, 1000], 0.0]
    # Hard constraints: each row is [class, field, [lower, upper]].
    # Inherited from cacti_csapr2_ppi_hard_const in the Python defaults.
    hard_const:
      - [melting,    sounding_temperature, [10, 100]]
      - [multi_trip, height,               [10000, 1000000]]
      - [melting,    sounding_temperature, [-10000, -2]]
      - [rain,       sounding_temperature, [-1000, -5]]
      - [snow,       sounding_temperature, [3, 100]]
      - [melting,    velocity_texture,     [3, 300]]
  bnf_csapr2_rhi:
    <<: *bnf_csapr2_cmac_values
    save_name: bnfcsapr2cmacrhiS3.c1

plot_values:
  bnf_csapr2_ppi:
    save_name: bnfcsaprcmacppiS3.c1
    min_lat: 33.7
    max_lat: 35.65
    min_lon: -88.4
    max_lon: -85.9
    sweep: 0
  bnf_csapr2_rhi:
    save_name: bnfcsaprcmacrhiS3.c1
    sweep: 0
